<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWS Advisory GmbH</title>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#1e2a3a;--fg:#e8eaed;--muted:rgba(255,255,255,0.5);--link:rgba(255,255,255,0.65);--accent:#fff;--sans:'Albert Sans',system-ui,sans-serif}

  body{background:var(--bg);color:var(--fg);font-family:var(--sans);min-height:100dvh;display:flex;align-items:flex-end;padding:clamp(2rem,5vw,4rem);position:relative}

  .lang{position:fixed;top:clamp(1.5rem,3vw,2.5rem);right:clamp(2rem,5vw,4rem);display:flex;gap:.1rem;font-size:.65rem;font-weight:400;letter-spacing:.04em;z-index:10}
  .lang button{background:none;border:none;font-family:var(--sans);font-size:.65rem;color:var(--muted);padding:.35rem .5rem;border-radius:4px;cursor:pointer;transition:color .2s;letter-spacing:.04em}
  .lang button:hover{color:var(--accent)}
  .lang button.active{color:var(--accent);font-weight:600}

  .main{max-width:480px;animation:up .8s cubic-bezier(.25,1,.5,1) both}
  @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .brand{font-size:clamp(2rem,5vw,2.8rem);letter-spacing:-.04em;line-height:1;margin-bottom:.2em}
  .brand b{font-weight:600;color:var(--accent)}
  .brand span{font-weight:300;color:var(--muted)}
  .legal{font-size:.7rem;font-weight:400;color:var(--muted);letter-spacing:.08em;margin-bottom:clamp(2rem,4vw,3.5rem)}

  .lines{font-weight:300;font-size:.95rem;line-height:2;margin-bottom:2.5rem;padding-left:1.1rem;border-left:1.5px solid var(--link);transition:opacity .25s}

  .name{font-size:.85rem;font-weight:600;letter-spacing:.01em;margin-bottom:.15rem;color:var(--accent)}
  .title{font-size:.75rem;font-weight:300;color:var(--muted);margin-bottom:2rem;transition:opacity .25s}

  .web{display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:400;color:var(--link);text-decoration:none;margin-bottom:2rem;transition:color .2s}
  .web:hover{color:var(--accent)}
  .web svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
  .web:hover svg{transform:translateX(2px)}

  .soc{display:flex;gap:1.25rem;align-items:center}
  .soc a{color:var(--muted);transition:color .25s;display:flex}
  .soc a:hover{color:var(--accent)}
  .soc svg{width:18px;height:18px;fill:currentColor}

  .foot{position:fixed;bottom:clamp(1.5rem,3vw,2.5rem);right:clamp(2rem,5vw,4rem);display:flex;gap:1.5rem;font-size:.65rem}
  .foot a{color:var(--muted);text-decoration:none;transition:color .2s}
  .foot a:hover{color:var(--accent)}

  @media(max-width:600px){
    body{align-items:center;padding:2rem 1.5rem;padding-top:4rem;flex-direction:column;justify-content:center}
    .lang{top:1.2rem;right:1.5rem}
    .foot{position:static;margin-top:3rem;align-self:flex-start}
  }
</style>
</head>
<body>

<div class="lang">
  <button class="active" data-lang="de">DE</button>
  <button data-lang="en">EN</button>
  <button data-lang="es">ES</button>
</div>

<div class="main">
  <div class="brand"><b>WWS</b> <span>Advisory</span></div>
  <div class="legal">GmbH · Berlin</div>
  <div class="lines" id="lines">
    Deutsche, europäische und internationale Politik.<br>
    Sicherheit, Technologie und Verteidigung.<br>
    Wirtschaft und Finanzen.
  </div>
  <div class="name">Wolfgang Schmidt</div>
  <div class="title" id="title">Bundesminister a.D.</div>
  <a class="web" href="https://wolfgang-schmidt.eu">
    <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
    wolfgang-schmidt.eu
  </a>
  <div class="soc">
    <a href="https://x.com/W_Schmidt_" aria-label="X" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    <a href="https://www.instagram.com/wowashamburg/" aria-label="Instagram" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
    <a href="https://www.linkedin.com/in/wolfgang-schmidt-germany" aria-label="LinkedIn" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>
  </div>
</div>

<div class="foot">
  <a href="https://wolfgang-schmidt.eu/impressum.html" id="foot-impr" target="_blank">Impressum</a>
  <a href="https://wolfgang-schmidt.eu/datenschutz.html" id="foot-dsgvo" target="_blank">Datenschutz</a>
</div>

<script>
const i18n = {
  de: { lines: 'Deutsche, europäische und internationale Politik.<br>Sicherheit, Technologie und Verteidigung.<br>Wirtschaft und Finanzen.', title: 'Bundesminister a.D.', impr: 'Impressum', dsgvo: 'Datenschutz', lang: 'de' },
  en: { lines: 'German, European and international politics.<br>Security, technology and defence.<br>Economy and finance.', title: 'Former Federal Minister', impr: 'Legal Notice', dsgvo: 'Privacy Policy', lang: 'en' },
  es: { lines: 'Política alemana, europea e internacional.<br>Seguridad, tecnología y defensa.<br>Economía y finanzas.', title: 'Ex Ministro Federal', impr: 'Aviso legal', dsgvo: 'Privacidad', lang: 'es' }
};
const linesEl = document.getElementById('lines'), titleEl = document.getElementById('title'), imprEl = document.getElementById('foot-impr'), dsgvoEl = document.getElementById('foot-dsgvo');
const buttons = document.querySelectorAll('.lang button');
function setLang(lang) {
  const t = i18n[lang];
  linesEl.style.opacity = '0'; titleEl.style.opacity = '0';
  setTimeout(() => {
    linesEl.innerHTML = t.lines; titleEl.textContent = t.title;
    imprEl.textContent = t.impr; dsgvoEl.textContent = t.dsgvo;
    document.documentElement.lang = t.lang;
    linesEl.style.opacity = '1'; titleEl.style.opacity = '1';
  }, 200);
  buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}
buttons.forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));
</script>

</body>
</html>
